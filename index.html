<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>自分育成RPG Ver1.1</title>
  <style>
    :root {
      --bg: #0f172a;
      --text: #f8fafc;
      --muted: #94a3b8;
      --gold: #facc15;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(56,189,248,0.18), transparent 32%),
        radial-gradient(circle at top right, rgba(250,204,21,0.12), transparent 30%),
        var(--bg);
      color: var(--text);
    }

    .app {
      max-width: 520px;
      margin: 0 auto;
      padding: 18px 18px 32px;
    }

    .hero { padding: 22px 4px 10px; }

    .title {
      margin: 0;
      font-size: 30px;
      letter-spacing: 0.03em;
    }

    .subtitle {
      margin-top: 6px;
      color: var(--muted);
      font-size: 14px;
    }

    .card {
      background: linear-gradient(180deg, rgba(30,41,59,0.96), rgba(15,23,42,0.96));
      border: 1px solid rgba(148,163,184,0.18);
      border-radius: 22px;
      padding: 18px;
      margin-bottom: 16px;
      box-shadow: 0 14px 34px rgba(0,0,0,0.25);
    }

    .point-card {
      background:
        linear-gradient(135deg, rgba(250,204,21,0.22), rgba(56,189,248,0.12)),
        linear-gradient(180deg, #1e293b, #111827);
    }

    h2 {
      margin: 0 0 14px;
      font-size: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .point-label {
      color: var(--muted);
      font-size: 13px;
    }

    .point {
      font-size: 42px;
      line-height: 1.1;
      font-weight: 900;
      color: var(--gold);
      margin-top: 4px;
    }

    .message {
      min-height: 28px;
      margin: 12px 0 14px;
      font-weight: 800;
      color: #86efac;
      line-height: 1.45;
    }

    .small {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    .summary-box {
      background: rgba(38,52,73,0.82);
      border: 1px solid rgba(148,163,184,0.16);
      border-radius: 16px;
      padding: 13px;
    }

    .summary-label {
      color: var(--muted);
      font-size: 12px;
    }

    .summary-value {
      font-size: 23px;
      font-weight: 900;
      margin-top: 4px;
      color: #facc15;
    }

    .reward-next {
      margin-top: 12px;
      background: rgba(250,204,21,0.12);
      border: 1px solid rgba(250,204,21,0.24);
      border-radius: 16px;
      padding: 13px;
    }

    .reward-next-title {
      color: #fde68a;
      font-size: 13px;
      font-weight: 800;
    }

    .reward-next-main {
      margin-top: 5px;
      font-size: 18px;
      font-weight: 900;
    }

    .action-wrap,
    .reward-wrap {
      position: relative;
    }

    .action-btn,
    .reward-btn,
    .save-btn,
    .reset-btn {
      width: 100%;
      border: 0;
      border-radius: 16px;
      padding: 15px 16px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      text-align: left;
      transition: transform 0.08s ease, filter 0.08s ease;
    }

    button:active {
      transform: scale(0.985);
      filter: brightness(1.08);
    }

    .good-btn {
      background: linear-gradient(135deg, #22c55e, #86efac);
      color: #052e16;
    }

    .bad-btn {
      background: linear-gradient(135deg, #fb7185, #fecdd3);
      color: #4c0519;
    }

    .reward-btn {
      background: linear-gradient(135deg, #facc15, #fde68a);
      color: #422006;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    .cost {
      white-space: nowrap;
      font-size: 13px;
      background: rgba(66,32,6,0.14);
      padding: 5px 9px;
      border-radius: 999px;
    }

    .result-badge {
      display: none;
      margin-top: 7px;
      padding: 9px 12px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 900;
      text-align: center;
      animation: pop 0.35s ease;
    }

    .result-badge.show { display: block; }

    .result-good {
      background: rgba(34,197,94,0.18);
      color: #86efac;
      border: 1px solid rgba(134,239,172,0.26);
    }

    .result-bad {
      background: rgba(251,113,133,0.18);
      color: #fda4af;
      border: 1px solid rgba(253,164,175,0.26);
    }

    .result-reward {
      background: rgba(250,204,21,0.18);
      color: #fde68a;
      border: 1px solid rgba(253,230,138,0.26);
    }

    @keyframes pop {
      0% { transform: scale(0.92); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .save-btn {
      background: linear-gradient(135deg, #38bdf8, #bae6fd);
      color: #082f49;
      text-align: center;
    }

    .reset-btn {
      background: #ef4444;
      color: white;
      text-align: center;
      margin-top: 4px;
    }

    .status-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .status-box {
      background: rgba(38,52,73,0.82);
      border: 1px solid rgba(148,163,184,0.16);
      border-radius: 16px;
      padding: 13px;
    }

    .status-name {
      color: var(--muted);
      font-size: 13px;
    }

    .status-value {
      font-size: 25px;
      font-weight: 900;
      margin-top: 4px;
    }

    .radar-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 4px 0 2px;
    }

    canvas {
      width: 100%;
      max-width: 340px;
      height: 340px;
    }

    .list {
      display: grid;
      gap: 9px;
    }

    .list-item {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      background: rgba(38,52,73,0.72);
      border: 1px solid rgba(148,163,184,0.14);
      border-radius: 14px;
      padding: 11px 12px;
      font-size: 14px;
    }

    .list-strong {
      font-weight: 900;
      color: #facc15;
      white-space: nowrap;
    }

    .log {
      font-size: 13px;
      line-height: 1.75;
      color: #cbd5e1;
      max-height: 240px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .log-item {
      padding: 9px 0;
      border-bottom: 1px solid rgba(148,163,184,0.13);
    }

    .section-label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 26px;
      height: 26px;
      border-radius: 999px;
      font-size: 14px;
    }

    .green-label { background: rgba(34,197,94,0.18); }
    .red-label { background: rgba(251,113,133,0.18); }
    .gold-label { background: rgba(250,204,21,0.18); }
    .blue-label { background: rgba(56,189,248,0.18); }
  </style>
</head>
<body>
  <div class="app">
    <div class="hero">
      <h1 class="title">自分育成RPG</h1>
      <div class="subtitle">Ver1.1｜今日の実績・継続ボーナス・次のご褒美</div>
    </div>

    <div class="card point-card">
      <div class="point-label">保有ポイント</div>
      <div class="point"><span id="points">0</span> pt</div>
      <div id="nextReward" class="reward-next"></div>
      <p id="message" class="message"></p>
      <button class="save-btn" onclick="saveData(true)">データ保存</button>
      <div class="small">保存すると、ブラウザを閉じてもデータが残ります。</div>
    </div>

    <div class="card">
      <h2><span class="section-label gold-label">📊</span>本日の戦果</h2>
      <div class="summary-grid">
        <div class="summary-box">
          <div class="summary-label">今日</div>
          <div class="summary-value"><span id="todayPoints">0</span>pt</div>
        </div>
        <div class="summary-box">
          <div class="summary-label">昨日</div>
          <div class="summary-value"><span id="yesterdayPoints">0</span>pt</div>
        </div>
        <div class="summary-box">
          <div class="summary-label">今週</div>
          <div class="summary-value"><span id="weekPoints">0</span>pt</div>
        </div>
        <div class="summary-box">
          <div class="summary-label">今日の実施数</div>
          <div class="summary-value"><span id="todayCount">0</span>回</div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2><span class="section-label green-label">✅</span>今日の実績</h2>
      <div id="todayAchievements" class="list"></div>
    </div>

    <div class="card">
      <h2><span class="section-label blue-label">◇</span>レーダーチャート</h2>
      <div class="radar-wrap">
        <canvas id="radar" width="340" height="340"></canvas>
      </div>
    </div>

    <div class="card">
      <h2><span class="section-label gold-label">🔥</span>継続記録</h2>
      <div id="streaks" class="list"></div>
      <div class="small" style="margin-top:10px;">3日連続で2倍 / 7日連続で3倍 / 14日連続で4倍 / 30日連続で10倍</div>
    </div>

    <div class="card">
      <h2><span class="section-label green-label">＋</span>良い行動</h2>
      <div class="grid" id="goodActions"></div>
      <div class="small" style="margin-top:10px;">同じ行動の本日2回目以降は、1・3・5・10・15ptから抽選。</div>
    </div>

    <div class="card">
      <h2><span class="section-label red-label">−</span>マイナス行動</h2>
      <div class="grid" id="badActions"></div>
    </div>

    <div class="card">
      <h2><span class="section-label blue-label">◆</span>ステータス</h2>
      <div class="status-grid" id="status"></div>
    </div>

    <div class="card">
      <h2><span class="section-label gold-label">🎁</span>ご褒美交換</h2>
      <div class="grid" id="rewards"></div>
    </div>

    <div class="card">
      <h2><span class="section-label blue-label">📝</span>履歴</h2>
      <div id="log" class="log"></div>
    </div>

    <button class="reset-btn" onclick="resetData()">データをリセット</button>
  </div>

  <script>
    const normalPoints = [1, 5, 7, 9, 10, 15, 20, 25, 30, 40, 50, 100, 150];
    const repeatPoints = [1, 3, 5, 10, 15];

    const goodActions = [
      { name: "筋トレをする", stats: { 筋力: 4, 人間力: 1 } },
      { name: "通勤時間に本を読む", stats: { 知力: 5 } },
      { name: "早起き", stats: { 精神力: 2, 知力: 2 } },
      { name: "めんどくさい事をやる", stats: { 精神力: 4, 人間力: 1 } },
      { name: "瞑想", stats: { 精神力: 4 } },
      { name: "FXの勉強", stats: { 知力: 5 } },
      { name: "子供達のSNS", stats: { 知力: 2, 人間力: 2 } }
    ];

    const badActions = [
      { name: "暴飲暴食", stats: { 筋力: -4, 精神力: -1 } },
      { name: "私欲による夜更かし", stats: { 精神力: -3 } },
      { name: "パチンコ", stats: { 精神力: -2, 知力: -2, 人間力: -2 } }
    ];

    const rewards = [
      { name: "爆食い", cost: 500 },
      { name: "早退の申請ができる", cost: 1000 },
      { name: "サウナ", cost: 1000 },
      { name: "パチンコ", cost: 1500 },
      { name: "お風呂にいく", cost: 2500 }
    ];

    const defaultData = {
      points: 0,
      stats: {
        筋力: 0,
        知力: 0,
        人間力: 0,
        精神力: 0
      },
      streaks: {},
      dailyActions: {},
      dailyPoints: {},
      log: []
    };

    let data = JSON.parse(localStorage.getItem("jibunRpgDataV11")) || structuredClone(defaultData);
    if (!data.streaks) data.streaks = {};
    if (!data.dailyActions) data.dailyActions = {};
    if (!data.dailyPoints) data.dailyPoints = {};
    if (!data.stats) data.stats = structuredClone(defaultData.stats);

    function todayString(offset = 0) {
      const d = new Date();
      d.setDate(d.getDate() + offset);
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    }

    function dateDiffDays(dateA, dateB) {
      const a = new Date(dateA + "T00:00:00");
      const b = new Date(dateB + "T00:00:00");
      return Math.round((b - a) / 86400000);
    }

    function startOfWeekString() {
      const d = new Date();
      const day = d.getDay();
      const diff = day === 0 ? -6 : 1 - day;
      d.setDate(d.getDate() + diff);
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const dd = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${dd}`;
    }

    function updateStreak(actionName) {
      const today = todayString();
      const current = data.streaks[actionName] || { count: 0, lastDate: "" };

      if (current.lastDate === today) {
        return current.count || 1;
      }

      if (current.lastDate && dateDiffDays(current.lastDate, today) === 1) {
        current.count += 1;
      } else {
        current.count = 1;
      }

      current.lastDate = today;
      data.streaks[actionName] = current;
      return current.count;
    }

    function getMultiplier(streakCount) {
      if (streakCount >= 30) return 10;
      if (streakCount >= 14) return 4;
      if (streakCount >= 7) return 3;
      if (streakCount >= 3) return 2;
      return 1;
    }

    function saveData(show = false) {
      localStorage.setItem("jibunRpgDataV11", JSON.stringify(data));
      if (show) showMessage("✅ データを保存しました");
    }

    function randomPick(array) {
      return array[Math.floor(Math.random() * array.length)];
    }

    function applyStats(stats) {
      Object.entries(stats).forEach(([key, value]) => {
        data.stats[key] += value;
      });
    }

    function formatStats(stats) {
      return Object.entries(stats).map(([key, value]) => {
        const sign = value > 0 ? "+" : "";
        return `${key}${sign}${value}`;
      }).join("、");
    }

    function ensureTodayAction(actionName) {
      const today = todayString();
      if (!data.dailyActions[today]) data.dailyActions[today] = {};
      if (!data.dailyActions[today][actionName]) data.dailyActions[today][actionName] = 0;
      return data.dailyActions[today][actionName];
    }

    function addDailyPoint(amount) {
      const today = todayString();
      if (!data.dailyPoints[today]) data.dailyPoints[today] = 0;
      data.dailyPoints[today] += amount;
    }

    function showBadge(id, text, type) {
      const badge = document.getElementById(id);
      badge.className = `result-badge show ${type}`;
      badge.textContent = text;
    }

    function addGoodAction(action, badgeId) {
      const today = todayString();
      const beforeCount = ensureTodayAction(action.name);
      const isRepeatToday = beforeCount >= 1;
      const basePoint = randomPick(isRepeatToday ? repeatPoints : normalPoints);

      data.dailyActions[today][action.name] += 1;

      const streakCount = updateStreak(action.name);
      const multiplier = getMultiplier(streakCount);
      const finalPoint = basePoint * multiplier;

      data.points += finalPoint;
      addDailyPoint(finalPoint);
      applyStats(action.stats);

      const statText = formatStats(action.stats);
      const countText = `本日${data.dailyActions[today][action.name]}回目`;
      const bonusText = multiplier > 1 ? ` / ${streakCount}日連続 ×${multiplier}` : ` / ${streakCount}日目`;
      data.log.unshift(`${new Date().toLocaleString()}：${action.name}（${countText}） → +${finalPoint}pt（元:${basePoint}pt${bonusText}） / ${statText}`);

      showMessage(`🎉 ${action.name}！ +${finalPoint}pt（${countText}）`);
      render();
      showBadge(badgeId, `+${finalPoint}pt 獲得！${isRepeatToday ? " 2回目以降抽選" : ""}${multiplier > 1 ? ` ×${multiplier}` : ""}`, "result-good");
    }

    function addBadAction(action, badgeId) {
      const point = randomPick(normalPoints);
      data.points -= point;
      addDailyPoint(-point);
      applyStats(action.stats);

      const statText = formatStats(action.stats);
      data.log.unshift(`${new Date().toLocaleString()}：${action.name} → -${point}pt / ${statText}`);

      showMessage(`💀 ${action.name}… -${point}pt`);
      render();
      showBadge(badgeId, `-${point}pt 減少…`, "result-bad");
    }

    function exchangeReward(reward, badgeId) {
      if (data.points < reward.cost) {
        showMessage(`ポイント不足！あと ${reward.cost - data.points}pt 必要`);
        render();
        showBadge(badgeId, `あと ${reward.cost - data.points}pt 必要`, "result-bad");
        return;
      }

      data.points -= reward.cost;
      data.log.unshift(`${new Date().toLocaleString()}：ご褒美交換 → ${reward.name} -${reward.cost}pt`);

      showMessage(`🎁 ${reward.name} を交換した！`);
      render();
      showBadge(badgeId, `-${reward.cost}pt 使用！`, "result-reward");
    }

    function showMessage(text) {
      document.getElementById("message").textContent = text;
    }

    function drawRadar() {
      const canvas = document.getElementById("radar");
      const ctx = canvas.getContext("2d");
      const w = canvas.width;
      const h = canvas.height;
      const cx = w / 2;
      const cy = h / 2;
      const radius = 112;
      const labels = ["筋力", "知力", "人間力", "精神力"];
      const values = labels.map(label => Math.max(0, data.stats[label] || 0));
      const maxValue = Math.max(50, ...values);

      ctx.clearRect(0, 0, w, h);
      ctx.font = "13px system-ui";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";

      for (let level = 1; level <= 5; level++) {
        const r = radius * level / 5;
        ctx.beginPath();
        labels.forEach((label, i) => {
          const angle = -Math.PI / 2 + i * 2 * Math.PI / labels.length;
          const x = cx + Math.cos(angle) * r;
          const y = cy + Math.sin(angle) * r;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        });
        ctx.closePath();
        ctx.strokeStyle = "rgba(148,163,184,0.22)";
        ctx.lineWidth = 1;
        ctx.stroke();
      }

      labels.forEach((label, i) => {
        const angle = -Math.PI / 2 + i * 2 * Math.PI / labels.length;
        const x = cx + Math.cos(angle) * radius;
        const y = cy + Math.sin(angle) * radius;

        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(x, y);
        ctx.strokeStyle = "rgba(148,163,184,0.18)";
        ctx.stroke();

        const lx = cx + Math.cos(angle) * (radius + 34);
        const ly = cy + Math.sin(angle) * (radius + 34);
        ctx.fillStyle = "#f8fafc";
        ctx.fillText(label, lx, ly - 8);
        ctx.fillStyle = "#facc15";
        ctx.font = "bold 15px system-ui";
        ctx.fillText(data.stats[label] || 0, lx, ly + 11);
        ctx.font = "13px system-ui";
      });

      ctx.beginPath();
      labels.forEach((label, i) => {
        const value = Math.max(0, data.stats[label] || 0);
        const r = radius * (value / maxValue);
        const angle = -Math.PI / 2 + i * 2 * Math.PI / labels.length;
        const x = cx + Math.cos(angle) * r;
        const y = cy + Math.sin(angle) * r;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.closePath();
      ctx.fillStyle = "rgba(56,189,248,0.28)";
      ctx.fill();
      ctx.strokeStyle = "rgba(56,189,248,0.95)";
      ctx.lineWidth = 3;
      ctx.stroke();

      labels.forEach((label, i) => {
        const value = Math.max(0, data.stats[label] || 0);
        const r = radius * (value / maxValue);
        const angle = -Math.PI / 2 + i * 2 * Math.PI / labels.length;
        const x = cx + Math.cos(angle) * r;
        const y = cy + Math.sin(angle) * r;
        ctx.beginPath();
        ctx.arc(x, y, 4, 0, Math.PI * 2);
        ctx.fillStyle = "#facc15";
        ctx.fill();
      });
    }

    function renderNextReward() {
      const area = document.getElementById("nextReward");
      const sorted = [...rewards].sort((a, b) => a.cost - b.cost);
      const next = sorted.find(reward => reward.cost > data.points);

      if (!next) {
        area.innerHTML = `
          <div class="reward-next-title">🎁 次のご褒美</div>
          <div class="reward-next-main">全て交換可能！</div>
          <div class="small">好きなご褒美を選べます。</div>
        `;
        return;
      }

      area.innerHTML = `
        <div class="reward-next-title">🎁 次のご褒美</div>
        <div class="reward-next-main">${next.name}</div>
        <div class="small">${next.cost}pt / あと ${next.cost - data.points}pt</div>
      `;
    }

    function renderSummaries() {
      const today = todayString();
      const yesterday = todayString(-1);
      const weekStart = startOfWeekString();

      const todayPoints = data.dailyPoints[today] || 0;
      const yesterdayPoints = data.dailyPoints[yesterday] || 0;
      let weekPoints = 0;

      Object.entries(data.dailyPoints).forEach(([date, point]) => {
        if (date >= weekStart && date <= today) weekPoints += point;
      });

      const todayActions = data.dailyActions[today] || {};
      const todayCount = Object.values(todayActions).reduce((sum, count) => sum + count, 0);

      document.getElementById("todayPoints").textContent = todayPoints >= 0 ? `+${todayPoints}` : todayPoints;
      document.getElementById("yesterdayPoints").textContent = yesterdayPoints >= 0 ? `+${yesterdayPoints}` : yesterdayPoints;
      document.getElementById("weekPoints").textContent = weekPoints >= 0 ? `+${weekPoints}` : weekPoints;
      document.getElementById("todayCount").textContent = todayCount;
    }

    function renderTodayAchievements() {
      const today = todayString();
      const todayActions = data.dailyActions[today] || {};
      const area = document.getElementById("todayAchievements");
      const rows = Object.entries(todayActions)
        .filter(([name, count]) => count > 0)
        .sort((a, b) => b[1] - a[1]);

      if (!rows.length) {
        area.innerHTML = `<div class="small">今日はまだ行動していません。</div>`;
        return;
      }

      area.innerHTML = rows.map(([name, count]) => `
        <div class="list-item">
          <strong>${name}</strong>
          <div class="list-strong">${count}回</div>
        </div>
      `).join("");
    }

    function renderStreaks() {
      const area = document.getElementById("streaks");
      const rows = goodActions.map(action => {
        const s = data.streaks[action.name] || { count: 0, lastDate: "" };
        const multiplier = getMultiplier(s.count || 0);
        return {
          name: action.name,
          count: s.count || 0,
          multiplier,
          lastDate: s.lastDate || ""
        };
      }).sort((a, b) => b.count - a.count);

      area.innerHTML = rows.map(row => {
        const bonus = row.multiplier > 1 ? ` ×${row.multiplier}` : "";
        const last = row.lastDate ? `最終：${row.lastDate}` : "未達成";
        return `
          <div class="list-item">
            <div>
              <strong>${row.name}</strong>
              <div class="small">${last}</div>
            </div>
            <div class="list-strong">${row.count}日${bonus}</div>
          </div>
        `;
      }).join("");
    }

    function render() {
      document.getElementById("points").textContent = data.points;
      renderNextReward();
      renderSummaries();
      renderTodayAchievements();

      const goodArea = document.getElementById("goodActions");
      goodArea.innerHTML = "";
      goodActions.forEach((action, index) => {
        const badgeId = `good-result-${index}`;
        const wrap = document.createElement("div");
        wrap.className = "action-wrap";
        wrap.innerHTML = `
          <button class="action-btn good-btn">${action.name}</button>
          <div id="${badgeId}" class="result-badge"></div>
        `;
        wrap.querySelector("button").onclick = () => addGoodAction(action, badgeId);
        goodArea.appendChild(wrap);
      });

      const badArea = document.getElementById("badActions");
      badArea.innerHTML = "";
      badActions.forEach((action, index) => {
        const badgeId = `bad-result-${index}`;
        const wrap = document.createElement("div");
        wrap.className = "action-wrap";
        wrap.innerHTML = `
          <button class="action-btn bad-btn">${action.name}</button>
          <div id="${badgeId}" class="result-badge"></div>
        `;
        wrap.querySelector("button").onclick = () => addBadAction(action, badgeId);
        badArea.appendChild(wrap);
      });

      const statusArea = document.getElementById("status");
      statusArea.innerHTML = "";
      Object.entries(data.stats).forEach(([key, value]) => {
        statusArea.innerHTML += `
          <div class="status-box">
            <div class="status-name">${key}</div>
            <div class="status-value">${value}</div>
          </div>
        `;
      });

      const rewardArea = document.getElementById("rewards");
      rewardArea.innerHTML = "";
      rewards.forEach((reward, index) => {
        const badgeId = `reward-result-${index}`;
        const wrap = document.createElement("div");
        wrap.className = "reward-wrap";
        wrap.innerHTML = `
          <button class="reward-btn">
            <span>${reward.name}</span>
            <span class="cost">${reward.cost}pt</span>
          </button>
          <div id="${badgeId}" class="result-badge"></div>
        `;
        wrap.querySelector("button").onclick = () => exchangeReward(reward, badgeId);
        rewardArea.appendChild(wrap);
      });

      document.getElementById("log").innerHTML =
        data.log.length
          ? data.log.map(item => `<div class="log-item">${item}</div>`).join("")
          : "まだ履歴はありません";

      renderStreaks();
      drawRadar();
    }

    function resetData() {
      if (confirm("本当にデータをリセットしますか？")) {
        data = structuredClone(defaultData);
        localStorage.removeItem("jibunRpgDataV11");
        showMessage("データをリセットしました");
        render();
      }
    }

    render();
  </script>
</body>
</html>
